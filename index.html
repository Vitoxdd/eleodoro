<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Simples</title>
    <style>
        /* Configuração de exibição centralizada */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #202024; /* Cinza escuro para evitar tela totalmente preta */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        /* Área do card */
        .card-box {
            width: 300px;
            height: 350px;
            perspective: 1000px;
        }

        /* O movimento de rotação */
        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            cursor: pointer;
        }

        /* Gira ao passar o mouse */
        .card-box:hover .card-inner {
            transform: rotateY(180deg);
        }

        /* Frente e Verso */
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        /* Estilo da Frente */
        .frente {
            background-color: #29292e;
            color: #ff9000;
            border: 2px solid #ff9000;
        }

        .frente h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            text-align: center;
        }

        .frente p {
            color: #8d8d99;
            font-size: 0.9rem;
        }

        /* Estilo do Verso */
        .verso {
            background-color: #ff9000;
            color: #121214;
            transform: rotateY(180deg);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card-box">
        <div class="card-inner">
            
            <div class="face frente">
                <h1>Casca de Bala</h1>
                <p>(Passe o mouse para virar)</p>
            </div>

            <div class="face verso">
                <p>🤝 Seu parceiro de todas as horas!</p>
            </div>

        </div>
    </div>

</body>
</html>
